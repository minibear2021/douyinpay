name: Auto Release & Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  check-and-publish:
    name: Check version, release & publish
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/douyinpay
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Extract version from pyproject.toml
      id: version
      run: |
        VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Check if version exists on PyPI
      id: check
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        echo "Current version: $VERSION"
        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://pypi.org/pypi/douyinpay/$VERSION/json)
        echo "PyPI HTTP status: $HTTP_CODE"
        if [ "$HTTP_CODE" = "200" ]; then
          echo "exists=true" >> $GITHUB_OUTPUT
          echo "Version $VERSION already exists on PyPI, skipping."
        else
          echo "exists=false" >> $GITHUB_OUTPUT
          echo "Version $VERSION is new, will publish."
        fi

    - name: Install build dependencies
      if: steps.check.outputs.exists == 'false'
      run: |
        python -m pip install --upgrade pip
        pip install build

    - name: Build package
      if: steps.check.outputs.exists == 'false'
      run: python -m build

    - name: Create GitHub Release
      if: steps.check.outputs.exists == 'false'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.version }}
        name: v${{ steps.version.outputs.version }}
        generate_release_notes: true
        files: dist/*

    - name: Publish to PyPI
      if: steps.check.outputs.exists == 'false'
      uses: pypa/gh-action-pypi-publish@release/v1
